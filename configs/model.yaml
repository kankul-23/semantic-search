# --- Общие настройки плотных эмбеддингов (Dense) ---
model_name: BAAI/bge-large-en-v1.5
device: cuda
batch_size: 32 # Уменьшили со 128 до 32, так как модель стала крупнее
normalize_embeddings: true
show_progress_bar: true
save_embeddings: true
embeddings_path: "indexes/embeddings/dense_embeddings.npy"

# --- Настройки разреженного индекса (TF-IDF Baseline) ---
sparse_lowercase: true
sparse_max_features: 50000
sparse_min_df: 2
sparse_ngram_range: [1, 1]
sparse_model_path: models/sparse
sparse_index_path: indexes/tfidf

# Параметры для Гибридного поиска (Hybrid Search & RRF)
rrf_k: 60
hybrid_depth_k: 100