# --------------------------------------------------
# Evaluation Metrics Configuration
# --------------------------------------------------

# Размеры поисковой выдачи, для которых рассчитывается Recall@K
top_k: [1, 3, 5, 10]

# Список метрик, которые будут рассчитываться в системе
metrics:
  - recall
  - mrr

# Дополнительные параметры для будущих экспериментов
relevance_threshold: 1
normalize_scores: false

# Настройки сохранения результатов оценки
save_results: true
results_path: "experiments/results"